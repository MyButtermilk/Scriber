name: Soniox region workspace

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source snapshot
        shell: python
        run: |
          import shutil
          shutil.make_archive("scriber-source", "zip", root_dir=".")
      - uses: actions/upload-artifact@v4
        with:
          name: scriber-source
          path: scriber-source.zip
          if-no-files-found: error
          retention-days: 1
