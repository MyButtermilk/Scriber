name: Dispatch overlay fix Windows installer

on:
  push:
    branches:
      - main

permissions:
  actions: write
  issues: write

jobs:
  dispatch-installer:
    if: startsWith(github.event.head_commit.message, 'Start full Windows installer for overlay fix')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch complete non-tag Windows installer
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          requested_at="$(date -u +%s)"

          jq -n '{
            ref: "main",
            inputs: {
              refresh_release_cache_artifacts: "false",
              upload_full_non_tag_installer: "true"
            }
          }' | gh api --method POST \
            "repos/$REPOSITORY/actions/workflows/release-windows.yml/dispatches" \
            --input - >/dev/null

          release_run_id=""
          release_run_url=""
          for _ in $(seq 1 90); do
            runs_json="$(gh api "repos/$REPOSITORY/actions/workflows/release-windows.yml/runs?event=workflow_dispatch&branch=main&per_page=30")"
            release_run_id="$(jq -r --arg sha "$SOURCE_SHA" --argjson requested_at "$requested_at" '
              [.workflow_runs[]
                | select(.head_sha == $sha)
                | select((.created_at | fromdateiso8601) >= ($requested_at - 60))]
              | sort_by(.created_at)
              | last
              | .id // empty
            ' <<<"$runs_json")"
            release_run_url="$(jq -r --arg sha "$SOURCE_SHA" --argjson requested_at "$requested_at" '
              [.workflow_runs[]
                | select(.head_sha == $sha)
                | select((.created_at | fromdateiso8601) >= ($requested_at - 60))]
              | sort_by(.created_at)
              | last
              | .html_url // empty
            ' <<<"$runs_json")"
            if [[ -n "$release_run_id" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "$release_run_id" ]]; then
            gh issue comment 21 --repo "$REPOSITORY" --body \
              "The complete Windows installer dispatch was submitted for commit \`$SOURCE_SHA\`, but its workflow run could not be resolved within the bounded lookup."
            exit 1
          fi

          gh issue comment 21 --repo "$REPOSITORY" --body \
            "Complete Windows installer build started for the merged overlay fix: $release_run_url"
          echo "release_run_id=$release_run_id" >> "$GITHUB_OUTPUT"
          echo "release_run_url=$release_run_url" >> "$GITHUB_OUTPUT"

      - name: Summarize dispatch
        shell: bash
        run: |
          {
            echo "### Complete Windows installer dispatched"
            echo
            echo "- Release run: ${{ steps.dispatch.outputs.release_run_url }}"
            echo "- Source commit: ${{ github.sha }}"
            echo "- Full non-tag installer upload: enabled"
          } >> "$GITHUB_STEP_SUMMARY"
