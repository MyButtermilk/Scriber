name: Add explicit full installer dispatch input

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  stage-release-workflow:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/explicit-full-installer-dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/explicit-full-installer-dispatch
          fetch-depth: 0

      - name: Generate modified release workflow as a normal staging blob
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/release-windows.yml')
          text = source.read_text(encoding='utf-8')

          input_anchor = (
              "      refresh_release_cache_artifacts:\n"
              "        description: \"Refresh large reusable release-cache artifacts\"\n"
              "        required: false\n"
              "        type: boolean\n"
              "        default: false\n"
          )
          input_replacement = input_anchor + (
              "      upload_full_non_tag_installer:\n"
              "        description: \"Upload the complete installer for a non-tag workflow run\"\n"
              "        required: false\n"
              "        type: boolean\n"
              "        default: false\n"
          )
          expression_start = '$' + '{{'
          expression_end = '}}'
          env_anchor = (
              "      SCRIBER_UPLOAD_FULL_NON_TAG_INSTALLER: "
              + expression_start
              + " vars.SCRIBER_UPLOAD_FULL_NON_TAG_INSTALLER "
              + expression_end
          )
          env_replacement = (
              "      SCRIBER_UPLOAD_FULL_NON_TAG_INSTALLER: "
              + expression_start
              + " (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_full_non_tag_installer == 'true') && '1' || vars.SCRIBER_UPLOAD_FULL_NON_TAG_INSTALLER "
              + expression_end
          )

          if text.count(input_anchor) != 1:
              raise SystemExit(f'Expected exactly one workflow_dispatch input anchor, found {text.count(input_anchor)}')
          if text.count(env_anchor) != 1:
              raise SystemExit(f'Expected exactly one installer upload environment anchor, found {text.count(env_anchor)}')

          text = text.replace(input_anchor, input_replacement, 1)
          text = text.replace(env_anchor, env_replacement, 1)

          staged = Path('.github/agent/release-windows.modified.txt')
          staged.parent.mkdir(parents=True, exist_ok=True)
          staged.write_text(text, encoding='utf-8', newline='')
          print(f'Staged {staged} with {len(text.encode("utf-8"))} bytes')
          PY

          git add .github/agent/release-windows.modified.txt
          git diff --cached --check

      - name: Commit staging blob
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Stage explicit full-installer workflow content"
          git push origin HEAD:agent/explicit-full-installer-dispatch
