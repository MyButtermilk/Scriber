name: Apply overlay click blocker fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

concurrency:
  group: apply-overlay-click-blocker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/fix-overlay-click-blocker'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: "agent/fix-overlay-click-blocker"
          fetch-depth: 0

      - name: Reconstruct patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file="$RUNNER_TEMP/fix-overlay-click-blocker.patch"
          cat .github/agent/overlay-click-blocker.part* > "$patch_file.b64"
          base64 --decode "$patch_file.b64" > "$patch_file"
          echo "870d25443a542c068ababd13cc334b8f0700dc6d4548f75cc06f00d5fdf31603  $patch_file" | sha256sum --check

      - name: Apply patch content deterministically
        shell: bash
        env:
          PATCH_FILE: ${{ runner.temp }}/fix-overlay-click-blocker.patch
        run: |
          set +e
          python - <<'PY' > .github/agent/bootstrap-diagnostic.txt 2>&1
          from __future__ import annotations

          import os
          import pathlib
          import shlex

          patch_path = pathlib.Path(os.environ["PATCH_FILE"])
          lines = patch_path.read_text(encoding="utf-8").splitlines(keepends=True)
          current_path: str | None = None
          current_hunk: list[str] | None = None
          hunks: list[tuple[str, str, str]] = []

          def flush_hunk() -> None:
              global current_hunk
              if current_hunk is None or current_path is None:
                  current_hunk = None
                  return
              old = "".join(line[1:] for line in current_hunk if line[:1] in {" ", "-"})
              new = "".join(line[1:] for line in current_hunk if line[:1] in {" ", "+"})
              if not old:
                  raise RuntimeError(f"Refusing context-free insertion for {current_path}")
              hunks.append((current_path, old, new))
              current_hunk = None

          for line in lines:
              if line.startswith("diff --git "):
                  flush_hunk()
                  parts = shlex.split(line.rstrip("\n"))
                  current_path = parts[3][2:]
                  continue
              if line.startswith("@@ "):
                  flush_hunk()
                  current_hunk = []
                  continue
              if current_hunk is not None:
                  if line.startswith("\\ No newline at end of file"):
                      continue
                  if line[:1] not in {" ", "+", "-"}:
                      raise RuntimeError(f"Unsupported hunk line for {current_path}: {line!r}")
                  current_hunk.append(line)
          flush_hunk()

          print(f"Parsed {len(hunks)} hunks")
          contents: dict[str, str] = {}
          counts: dict[str, int] = {}
          for index, (path, old, new) in enumerate(hunks, start=1):
              file_path = pathlib.Path(path)
              text = contents.get(path, file_path.read_text(encoding="utf-8"))
              occurrences = text.count(old)
              print(
                  f"Hunk {index}: path={path} old_bytes={len(old.encode())} "
                  f"new_bytes={len(new.encode())} occurrences={occurrences} "
                  f"start={old[:100]!r}"
              )
              if occurrences != 1:
                  raise RuntimeError(f"Hunk {index} expected one old block in {path}, found {occurrences}")
              contents[path] = text.replace(old, new, 1)
              counts[path] = counts.get(path, 0) + 1

          for path, text in contents.items():
              pathlib.Path(path).write_text(text, encoding="utf-8", newline="")
              print(f"Applied {counts[path]} hunks to {path}")
          PY
          apply_status=$?
          cat .github/agent/bootstrap-diagnostic.txt
          if [[ $apply_status -ne 0 ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/agent/bootstrap-diagnostic.txt
            git commit -m "Record deterministic overlay patch failure"
            git push origin HEAD:"agent/fix-overlay-click-blocker"
            exit "$apply_status"
          fi
          set -euo pipefail

          git add \
            Frontend/src-tauri/src/native_overlay.rs \
            Frontend/client/src/components/NativeRecordingOverlay.tsx \
            docs/ARCHITECTURE.md \
            src/native_overlay.py \
            tests/test_native_overlay.py
          git rm .github/agent/overlay-click-blocker.part*
          git rm -f .github/agent/bootstrap-diagnostic.txt
          git rm .github/workflows/agent-apply-overlay-click-blocker.yml
          git diff --cached --check

      - name: Run focused regression tests
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check --quiet pytest loguru
          python -m py_compile src/native_overlay.py tests/test_native_overlay.py
          python -m pytest tests/test_native_overlay.py -q

      - name: Commit fix to feature branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Prevent hidden overlay from blocking clicks"
          git push origin HEAD:"agent/fix-overlay-click-blocker"
