name: Apply overlay click blocker fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

concurrency:
  group: apply-overlay-click-blocker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/fix-overlay-click-blocker'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: "agent/fix-overlay-click-blocker"
          fetch-depth: 0

      - name: Reconstruct, validate, test, and commit patch
        shell: bash
        run: |
          set -uo pipefail
          diagnostic="$RUNNER_TEMP/overlay-patch-diagnostic.txt"
          patch_file="$RUNNER_TEMP/fix-overlay-click-blocker.patch"
          : > "$diagnostic"

          persist_failure() {
            status="$1"
            cp "$diagnostic" .github/agent/bootstrap-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/agent/bootstrap-diagnostic.txt
            git commit -m "Record overlay patch bootstrap failure" || true
            git push origin HEAD:"agent/fix-overlay-click-blocker" || true
            exit "$status"
          }

          exec > >(tee -a "$diagnostic") 2>&1
          echo "Reconstructing patch"
          cat .github/agent/overlay-click-blocker.part* > "$patch_file.b64" || persist_failure $?
          base64 --decode "$patch_file.b64" > "$patch_file" || persist_failure $?
          actual_hash="$(sha256sum "$patch_file" | cut -d' ' -f1)"
          echo "Expected SHA256: 870d25443a542c068ababd13cc334b8f0700dc6d4548f75cc06f00d5fdf31603"
          echo "Actual SHA256:   $actual_hash"
          echo "Patch bytes:     $(wc -c < "$patch_file")"
          [[ "$actual_hash" == "870d25443a542c068ababd13cc334b8f0700dc6d4548f75cc06f00d5fdf31603" ]] || persist_failure 91

          echo "Checking patch"
          patch --dry-run --batch --forward --fuzz=0 -p1 < "$patch_file" || persist_failure $?
          echo "Applying patch"
          patch --batch --forward --fuzz=0 -p1 < "$patch_file" || persist_failure $?

          git add \
            Frontend/src-tauri/src/native_overlay.rs \
            Frontend/client/src/components/NativeRecordingOverlay.tsx \
            docs/ARCHITECTURE.md \
            src/native_overlay.py \
            tests/test_native_overlay.py || persist_failure $?
          git rm .github/agent/overlay-click-blocker.part* || persist_failure $?
          git rm .github/workflows/agent-apply-overlay-click-blocker.yml || persist_failure $?
          git diff --cached --check || persist_failure $?

          echo "Installing focused test dependencies"
          python -m pip install --disable-pip-version-check --quiet pytest loguru || persist_failure $?
          python -m py_compile src/native_overlay.py tests/test_native_overlay.py || persist_failure $?
          python -m pytest tests/test_native_overlay.py -q || persist_failure $?

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Prevent hidden overlay from blocking clicks" || persist_failure $?
          git push origin HEAD:"agent/fix-overlay-click-blocker" || persist_failure $?
