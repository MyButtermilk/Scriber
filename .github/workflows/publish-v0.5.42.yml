name: Publish Scriber v0.5.42

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  publish-tag:
    if: github.event.head_commit.message == 'Publish Scriber v0.5.42'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v0.5.42
      RELEASE_VERSION: 0.5.42
      TARGET_SHA: 6bd7172fcd71ab2f2e8b1341165d69ed7f0c554e
      REPOSITORY: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Verify the exact release commit and version
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "$TARGET_SHA^{commit}"
          test "$(git show "$TARGET_SHA:Frontend/package.json" | python -c 'import json,sys; print(json.load(sys.stdin)["version"])')" = "$RELEASE_VERSION"
          test "$(git show "$TARGET_SHA:Frontend/package-lock.json" | python -c 'import json,sys; data=json.load(sys.stdin); print(data["version"]); assert data["packages"][""]["version"] == data["version"]')" = "$RELEASE_VERSION"
          test "$(git show "$TARGET_SHA:src/version.py" | sed -n 's/^__version__ = "\([^"]*\)"$/\1/p')" = "$RELEASE_VERSION"

          git checkout --detach "$TARGET_SHA"
          GITHUB_REF_TYPE=tag GITHUB_REF_NAME="$RELEASE_TAG" python scripts/sync_version.py
          git diff --exit-code
          git checkout main

      - name: Create the release tag
        shell: bash
        run: |
          set -euo pipefail
          existing_sha="$(gh api "repos/$REPOSITORY/git/ref/tags/$RELEASE_TAG" --jq '.object.sha' 2>/dev/null || true)"
          if [[ -n "$existing_sha" ]]; then
            if [[ "$existing_sha" != "$TARGET_SHA" ]]; then
              echo "Tag $RELEASE_TAG already points to $existing_sha instead of $TARGET_SHA" >&2
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists on the intended commit."
          else
            jq -n --arg ref "refs/tags/$RELEASE_TAG" --arg sha "$TARGET_SHA" '{ref: $ref, sha: $sha}' |
              gh api --method POST "repos/$REPOSITORY/git/refs" --input - >/dev/null
            echo "Created $RELEASE_TAG on $TARGET_SHA."
          fi

      - name: Dispatch the signed tag release workflow
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          requested_at="$(date -u +%s)"
          jq -n --arg ref "$RELEASE_TAG" '{
            ref: $ref,
            inputs: {
              refresh_release_cache_artifacts: "false",
              upload_full_non_tag_installer: "false"
            }
          }' | gh api --method POST \
            "repos/$REPOSITORY/actions/workflows/release-windows.yml/dispatches" \
            --input - >/dev/null

          release_run_id=""
          release_run_url=""
          for _ in $(seq 1 90); do
            runs_json="$(gh api "repos/$REPOSITORY/actions/workflows/release-windows.yml/runs?event=workflow_dispatch&per_page=30")"
            release_run_id="$(jq -r --arg sha "$TARGET_SHA" --argjson requested_at "$requested_at" '
              [.workflow_runs[]
                | select(.head_sha == $sha)
                | select((.created_at | fromdateiso8601) >= ($requested_at - 60))]
              | sort_by(.created_at)
              | last
              | .id // empty
            ' <<<"$runs_json")"
            release_run_url="$(jq -r --arg sha "$TARGET_SHA" --argjson requested_at "$requested_at" '
              [.workflow_runs[]
                | select(.head_sha == $sha)
                | select((.created_at | fromdateiso8601) >= ($requested_at - 60))]
              | sort_by(.created_at)
              | last
              | .html_url // empty
            ' <<<"$runs_json")"
            if [[ -n "$release_run_id" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "$release_run_id" ]]; then
            echo "The tag was created, but the release workflow run could not be resolved." >&2
            exit 1
          fi

          echo "release_run_id=$release_run_id" >> "$GITHUB_OUTPUT"
          echo "release_run_url=$release_run_url" >> "$GITHUB_OUTPUT"
          gh issue comment 21 --repo "$REPOSITORY" --body \
            "Signed updater release $RELEASE_TAG started: $release_run_url"

      - name: Remove the one-shot publisher
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git rm .github/workflows/publish-v0.5.42.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove one-shot v0.5.42 publisher"
          git push origin HEAD:main

      - name: Summarize release dispatch
        shell: bash
        run: |
          {
            echo "### Scriber v0.5.42"
            echo
            echo "- Tag commit: \`$TARGET_SHA\`"
            echo "- Release workflow: ${{ steps.dispatch.outputs.release_run_url }}"
            echo "- Signed updater publication: requested"
          } >> "$GITHUB_STEP_SUMMARY"
