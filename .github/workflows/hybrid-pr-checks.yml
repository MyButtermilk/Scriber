name: Hybrid PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/hybrid-tauri-performance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-gates:
    name: Python hybrid gates
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python gate dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install aiohttp

      - name: Run focused Python gates
        shell: pwsh
        run: |
          python -m pytest `
            tests\test_tauri_security_gates.py `
            tests\perf\test_frontend_browser_smoke_script.py `
            tests\test_validate_hybrid_release_readiness.py `
            tests\test_hybrid_release_readiness_runner.py `
            tests\test_verify_tauri_updater_publication.py `
            tests\test_windows_authenticode_gate.py

  frontend-gates:
    name: Frontend typecheck and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: Frontend
        run: npm run check

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

  rust-gates:
    name: Tauri Rust unit tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tauri unit tests
        working-directory: Frontend/src-tauri
        run: cargo test
