name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-base.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-build.txt

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows.ps1 -SkipSmoke

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item Frontend\src-tauri\target\release\bundle\nsis\*.exe release-artifacts\
          Copy-Item Frontend\src-tauri\target\release\release-metadata\*.json release-artifacts\
          Copy-Item Frontend\src-tauri\target\release\release-metadata\SHA256SUMS.txt release-artifacts\

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scriber-windows-release
          path: release-artifacts/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
